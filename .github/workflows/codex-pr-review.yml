name: Codex PR review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  codex_review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.review_message }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'pull_request' && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Pre-fetch PR refs
        if: github.event_name == 'pull_request'
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch --no-tags origin \
            "$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Restore Codex ChatGPT auth
        run: |
          mkdir -p .github/codex/home
          printf '%s' "$CODEX_AUTH_JSON" > .github/codex/home/auth.json
          chmod 600 .github/codex/home/auth.json
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}

      - name: Run Codex review (ChatGPT auth)
        id: run_codex
        env:
          CODEX_HOME: ${{ github.workspace }}/.github/codex/home
        run: |
          set -euo pipefail
          PROMPT_FILE=".github/codex/prompts/review.md"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.ref }}"
            codex exec review \
              --base "$BASE_REF" \
              -o codex-review.md \
              - < "$PROMPT_FILE"
          else
            codex exec review \
              --uncommitted \
              -o codex-review.md \
              - < "$PROMPT_FILE"
          fi
          {
            echo 'review_message<<EOF'
            cat codex-review.md
            echo EOF
          } >> "$GITHUB_OUTPUT"

  post_review:
    runs-on: ubuntu-latest
    needs: codex_review
    if: github.event_name == 'pull_request' && needs.codex_review.outputs.final_message != ''
    permissions:
      pull-requests: write
    steps:
      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex_review.outputs.final_message }}
