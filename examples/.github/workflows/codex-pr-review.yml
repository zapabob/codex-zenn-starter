name: Codex PR review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  codex_review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'pull_request' && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Pre-fetch PR refs
        if: github.event_name == 'pull_request'
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch --no-tags origin \
            "$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Restore Codex ChatGPT auth
        run: |
          mkdir -p .github/codex/home
          printf '%s' "$CODEX_AUTH_JSON" > .github/codex/home/auth.json
          chmod 600 .github/codex/home/auth.json
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}

      - name: Run Codex review (ChatGPT auth)
        env:
          CODEX_HOME: ${{ github.workspace }}/.github/codex/home
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            codex exec review \
              --base "${{ github.event.pull_request.base.ref }}" \
              --dangerously-bypass-approvals-and-sandbox \
              -o codex-review.md
          else
            codex exec review \
              --uncommitted \
              --dangerously-bypass-approvals-and-sandbox \
              -o codex-review.md
          fi
          tr -d '\0' < codex-review.md > codex-review-clean.md

      - name: Upload review artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-review
          path: codex-review-clean.md
          if-no-files-found: error

  post_review:
    runs-on: ubuntu-latest
    needs: codex_review
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Download review artifact
        uses: actions/download-artifact@v4
        with:
          name: codex-review

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const body = fs.readFileSync("codex-review-clean.md", "utf8").trim();
            if (!body) {
              core.setFailed("Codex review output is empty");
              return;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
