# CI profile for Codex GitHub Action
# Copy to .github/codex/home/config.toml in your repository

approval_policy = "never"
sandbox_mode = "workspace-write"

project_doc_fallback_filenames = ["AGENTS.md"]
project_doc_max_bytes = 32768

[sandbox_workspace_write]
# ChatGPT auth CI needs HTTPS to OpenAI; codex-action API-key path may use false
network_access = true

# Optional: enable read-only GitHub MCP in CI (token via env in workflow)
# [mcp_servers.github]
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-github@latest"]
# env_vars = ["GITHUB_TOKEN"]
